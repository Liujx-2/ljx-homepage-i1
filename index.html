<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ljx的聊天室_</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #0f0f1a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }
        .chat-container {
            width: 420px;
            max-width: 96%;
            height: 680px;
            max-height: 96vh;
            background: #1a1a2e;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2a4a;
        }
        .header {
            padding: 20px 24px 16px;
            background: linear-gradient(135deg, #16213e, #1a1a2e);
            border-bottom: 1px solid #2a2a4a;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { color: #e0e0ff; font-size: 20px; font-weight: 600; }
        .header .sub { color: #8888aa; font-size: 13px; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #14142a;
        }
        .msg {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.25s ease;
        }
        .msg.self {
            align-self: flex-end;
            background: linear-gradient(135deg, #4a6cf7, #6a4cf7);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.other {
            align-self: flex-start;
            background: #25254a;
            color: #d0d0f0;
            border-bottom-left-radius: 4px;
        }
        .msg .name { font-size: 12px; font-weight: 600; color: #8888cc; margin-bottom: 2px; }
        .msg.self .name { color: #aabbff; }
        .msg .time { font-size: 10px; color: #666688; margin-left: 10px; }
        .input-area {
            padding: 16px 20px 20px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .input-area input[type="text"] {
            flex: 1;
            min-width: 120px;
            padding: 12px 18px;
            border-radius: 30px;
            border: 1px solid #333366;
            background: #0f0f20;
            color: #e0e0ff;
            font-size: 15px;
            outline: none;
        }
        .input-area input:focus { border-color: #6a4cf7; box-shadow: 0 0 0 3px rgba(106,76,247,0.15); }
        .input-area input::placeholder { color: #555577; }
        .input-area button {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #4a6cf7, #6a4cf7);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .input-area button:active { transform: scale(0.95); }
        .system { text-align: center; color: #444466; font-size: 12px; padding: 6px 0; }
        .loading { text-align: center; color: #555577; font-size: 13px; padding: 30px 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #333366; border-radius: 10px; }
        .username-bar {
            display: flex;
            gap: 8px;
            padding: 0 20px 8px;
            flex-shrink: 0;
        }
        .username-bar input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 20px;
            border: 1px solid #333366;
            background: #0f0f20;
            color: #e0e0ff;
            font-size: 14px;
            outline: none;
        }
        .username-bar input:focus { border-color: #6a4cf7; }
        .username-bar span {
            color: #8888aa;
            font-size: 14px;
            align-self: center;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1>💬 ljx的聊天室_</h1>
        <div class="sub" id="statusText">🟢 已连接</div>
    </div>

    <div class="messages" id="messageContainer">
        <div class="loading" id="loadingIndicator">⏳ 加载历史记录...</div>
    </div>

    <div class="username-bar">
        <span>👤</span>
        <input type="text" id="usernameInput" placeholder="输入昵称" value="访客" maxlength="20">
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="输入消息...">
        <button id="sendButton" onclick="sendMessage();return false;">发送</button>
    </div>
</div>

<script>
    // =============================================
    // ！！！请务必检查这两行是否复制完整 ！！！
    // =============================================
    var SUPABASE_URL = 'https://goypdcakedglrswxeuto.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdveXBkY2FrZWRnbHJzd3hldXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjQ1OTIsImV4cCI6MjA5NzkwMDU5Mn0.IXLkQd-h0G6kU6Db9Vl5l5pBKKqQ-Gqf4zf2eV2h5-A';
    // =============================================

    var currentUsername = '';
    var msgContainer = document.getElementById('messageContainer');
    var msgInput = document.getElementById('messageInput');
    var usernameInput = document.getElementById('usernameInput');
    var statusText = document.getElementById('statusText');
    var loadingIndicator = document.getElementById('loadingIndicator');

    // 封装通用 fetch 请求（自动带 headers）
    function supabaseFetch(path, options) {
        var url = SUPABASE_URL + '/rest/v1/' + path;
        var headers = {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json'
        };
        // 合并 headers
        if (options && options.headers) {
            Object.assign(headers, options.headers);
        }
        return fetch(url, Object.assign({}, options, { headers: headers }));
    }

    function formatTime(isoStr) {
        var d = new Date(isoStr);
        return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    function addMessage(content, username, created_at, isSelf) {
        var div = document.createElement('div');
        div.className = 'msg ' + (isSelf ? 'self' : 'other');
        var nameSpan = document.createElement('div');
        nameSpan.className = 'name';
        nameSpan.textContent = username + '  ' + formatTime(created_at);
        div.appendChild(nameSpan);
        var textSpan = document.createElement('span');
        textSpan.textContent = content;
        div.appendChild(textSpan);
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function addSystemMsg(text) {
        var div = document.createElement('div');
        div.className = 'system';
        div.textContent = text;
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    // ========== 加载历史 ==========
    function loadHistory() {
        supabaseFetch('messages?select=*&order=created_at.asc')
            .then(function(res) {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(function(data) {
                if (loadingIndicator) loadingIndicator.remove();
                if (!Array.isArray(data) || data.length === 0) {
                    addSystemMsg('📭 暂无消息，发一条开始聊天吧！');
                    return;
                }
                for (var i = 0; i < data.length; i++) {
                    var msg = data[i];
                    var isSelf = (msg.username === currentUsername);
                    addMessage(msg.content, msg.username, msg.created_at, isSelf);
                }
                addSystemMsg('✅ 已加载 ' + data.length + ' 条历史');
            })
            .catch(function(err) {
                if (loadingIndicator) loadingIndicator.remove();
                addSystemMsg('⚠️ 加载失败: ' + err.message);
            });
    }

    // ========== 发送消息 ==========
    function sendMessage() {
        var content = msgInput.value.trim();
        if (!content) {
            msgInput.style.borderColor = 'red';
            setTimeout(function() { msgInput.style.borderColor = '#333366'; }, 500);
            return;
        }

        var name = usernameInput.value.trim() || '匿名用户';
        currentUsername = name;

        var now = new Date().toISOString();
        addMessage(content, currentUsername, now, true);
        msgInput.value = '';
        msgInput.focus();

        supabaseFetch('messages', {
            method: 'POST',
            body: JSON.stringify({ content: content, username: currentUsername })
        })
        .then(function(res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        })
        .then(function(data) {
            console.log('✅ 存入成功:', data);
        })
        .catch(function(err) {
            console.error('发送失败:', err);
            addSystemMsg('⚠️ 发送失败: ' + err.message);
        });
    }

    // ========== 暴露到全局 ==========
    window.sendMessage = sendMessage;

    // ========== 启动 ==========
    loadHistory();

    msgInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    usernameInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') msgInput.focus();
    });

    msgInput.focus();
    statusText.textContent = '🟢 已就绪';
</script>

</body>
</html>
